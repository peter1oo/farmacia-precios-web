<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Precios vs. La Rebaja</title>
<style>
  :root {
    --bg: #f4f6f4;
    --card: #ffffff;
    --ink: #1b211d;
    --muted: #5c665f;
    --line: #dbe2d8;
    --good: #2e7d50;
    --good-bg: #e1f0e5;
    --bad: #b8412a;
    --bad-bg: #f7e6e0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  header {
    padding: 1.2rem 1rem;
    background: var(--card);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
  }
  h1 {
    font-size: 1.1rem;
    margin: 0 0 0.7rem;
  }
  #buscador {
    width: 100%;
    max-width: 640px;
    padding: 0.7rem 0.9rem;
    font-size: 1rem;
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  #estado {
    max-width: 640px;
    margin: 0.5rem 0 0;
    font-size: 0.85rem;
    color: var(--muted);
  }
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 1rem;
    display: grid;
    gap: 0.7rem;
  }
  .producto {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 0.9rem 1rem;
  }
  .producto .nombre {
    font-weight: 600;
    margin-bottom: 0.2rem;
  }
  .producto .meta {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }
  .producto .funcion {
    font-size: 0.85rem;
    margin-bottom: 0.6rem;
  }
  .badge {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 600;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    margin-left: 0.4rem;
  }
  .badge.ok { background: var(--good-bg); color: var(--good); }
  .badge.no { background: var(--bad-bg); color: var(--bad); }
  .precios {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .precio {
    padding: 0.4rem 0.7rem;
    border-radius: 8px;
    background: #eef1ec;
    font-size: 0.85rem;
  }
  .precio.mejor { background: var(--good-bg); color: var(--good); }
  .precio.peor { background: var(--bad-bg); color: var(--bad); }
  .precio b { display: block; font-size: 1rem; }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    padding: 2rem 1rem;
  }
</style>
</head>
<body>
  <header>
    <h1>Precios propios vs. Drogas La Rebaja</h1>
    <input id="buscador" type="text" placeholder="Escribe el nombre o EAN del producto para buscar...">
    <p id="estado"></p>
  </header>
  <main id="resultados"></main>
  <footer>
    Las descripciones marcadas "no verificado" deben confirmarse por un químico farmacéutico antes de comunicarlas al cliente.
  </footer>

<script>
const LIMITE_RESULTADOS = 50;
const buscador = document.getElementById("buscador");
const contenedor = document.getElementById("resultados");
const estado = document.getElementById("estado");

let productos = [];

function normalizar(s) {
  return (s || "")
    .toString()
    .toUpperCase()
    .normalize("NFKD")
    .replace(/[̀-ͯ]/g, "");
}

function formatoPrecio(n) {
  if (n === null || n === undefined) return null;
  return "$" + Math.round(n).toLocaleString("es-CO");
}

function renderProducto(p) {
  const propio = p.precio_farmacia;
  const competencia = p.precio_larebaja;
  let claseCompetencia = "precio";
  let claseCompetenciaLabel = "La Rebaja";
  if (competencia != null) {
    claseCompetencia += propio <= competencia ? " mejor" : " peor";
  }

  const badge = p.funcion
    ? `<span class="badge ok">verificado</span>`
    : `<span class="badge no">sin descripción</span>`;

  const funcionHtml = p.funcion
    ? `<div class="funcion">${p.funcion}${badge}</div>`
    : `<div class="funcion">${badge}</div>`;

  const fecha = p.ultima_consulta_larebaja
    ? `· competencia consultada ${p.ultima_consulta_larebaja}`
    : "· sin dato de competencia aún";

  return `
    <div class="producto">
      <div class="nombre">${p.nombre}</div>
      <div class="meta">${p.proveedor} · EAN ${p.ean} ${fecha}</div>
      ${funcionHtml}
      <div class="precios">
        <div class="precio"><span>Tu precio</span><b>${formatoPrecio(propio)}</b></div>
        <div class="${claseCompetencia}"><span>${claseCompetenciaLabel}</span><b>${competencia != null ? formatoPrecio(competencia) : "Sin dato"}</b></div>
      </div>
    </div>
  `;
}

function buscar(termino) {
  const t = normalizar(termino).trim();
  if (!t) {
    contenedor.innerHTML = "";
    estado.textContent = `Catálogo con ${productos.length.toLocaleString("es-CO")} productos. Escribe para buscar.`;
    return;
  }
  const coincidencias = productos.filter(
    (p) => normalizar(p.nombre).includes(t) || normalizar(p.ean).includes(t)
  );
  const mostrados = coincidencias.slice(0, LIMITE_RESULTADOS);
  contenedor.innerHTML = mostrados.map(renderProducto).join("");
  estado.textContent =
    coincidencias.length > LIMITE_RESULTADOS
      ? `Mostrando ${LIMITE_RESULTADOS} de ${coincidencias.length} resultados. Afina tu búsqueda.`
      : `${coincidencias.length} resultado(s).`;
}

buscador.addEventListener("input", (e) => buscar(e.target.value));

fetch("datos.json?v=" + Date.now())
  .then((r) => r.json())
  .then((data) => {
    productos = data.productos;
    estado.textContent = `Catálogo con ${productos.length.toLocaleString("es-CO")} productos (generado ${data.generado}). Escribe para buscar.`;
  })
  .catch(() => {
    estado.textContent = "No se pudo cargar el catálogo. Verifica tu conexión.";
  });
</script>
</body>
</html>
