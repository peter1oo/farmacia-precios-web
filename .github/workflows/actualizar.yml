name: Actualizar precios y publicar

on:
  schedule:
    # 3:00 AM hora de Bogota (UTC-5, sin horario de verano) = 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: actualizar-precios
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Seleccionar lote del dia (top ventas + franja rotativa)
        run: python scraper/seleccionar_lote.py

      - name: Consultar precios de La Rebaja para el lote de hoy
        run: python scraper/scrapear_larebaja.py

      - name: Regenerar la web (aborta si la tasa de match cae sospechosamente)
        run: python scraper/generar_web.py

      - name: Guardar el catalogo/cache actualizado en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ web/
          git diff --cached --quiet || git commit -m "Actualizacion automatica de precios $(date -u +%F)"
          git push

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - uses: actions/deploy-pages@v4
